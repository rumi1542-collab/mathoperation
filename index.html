<html lang="ko">
<head>

    <title>류의 수학 학습 센터</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
        }
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .dashboard {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 28px;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .menu-item {
            text-decoration: none;
            padding: 20px;
            background: #fff;
            border: 2px solid #e0e6ed;
            border-radius: 12px;
            color: var(--primary);
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .menu-item:hover {
            border-color: var(--accent);
            background: #f0f7ff;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.2);
        }
        .icon {
            font-size: 24px;
        }
        .footer {
            margin-top: 30px;
            font-size: 13px;
            color: #bdc3c7;
        }
    </style>
</head>
